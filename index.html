<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Exercise</title>

<style>
body{
    background-color: #eeeeee;
    padding: 40px;
    font-family: "Times New Roman", serif;
}

/* Heading 1 */
h1{
    text-shadow: 12px 12px pink;
    border-top: 5px solid black;
    display: inline-block;
    padding-top: 10px;
}

/* Heading 2 */
.box{
    border: 3px solid black;
    outline: 4px solid yellow;
    padding: 10px;
    width: 600px;
    margin-top: 30px;
}

h2{
    font-style: italic;
    margin: 0;
}

/* Heading 3 */
h3{
    text-align: right;
    text-decoration: underline;
    margin-top: 50px;
}
</style>

</head>

<body>

<h1>This is heading 1</h1>

<div class="box">
    <h2>This is heading 2</h2>
</div>

<h3>This is heading 3</h3>

</body>
</html>
